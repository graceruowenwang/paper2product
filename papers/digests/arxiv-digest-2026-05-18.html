<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arXiv Daily — 5月18日 · 星期一</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #f7f7f8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    color: #1a1a2e;
    -webkit-font-smoothing: antialiased;
}
.wrapper { max-width: 520px; margin: 0 auto; padding: 24px 16px; }
.card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04);
    margin-bottom: 20px;
}

/* header */
.header {
    background: #1a1a2e;
    color: #fff;
    padding: 28px 24px;
    text-align: center;
}
.header .brand {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
}
.header .date {
    font-size: 13px;
    opacity: 0.65;
    margin-top: 6px;
}

/* stats */
.stats-row {
    display: flex;
    padding: 20px 24px;
    gap: 16px;
}
.stat-box {
    flex: 1;
    background: #f7f7f8;
    border-radius: 10px;
    padding: 14px 12px;
    text-align: center;
}
.stat-box .num {
    font-size: 26px;
    font-weight: 700;
    color: #1a1a2e;
}
.stat-box .label {
    font-size: 11px;
    color: #888;
    margin-top: 4px;
    letter-spacing: 0.3px;
}

/* papers */
.paper-list { padding: 0 24px 16px 24px; }
.paper-item {
    padding: 14px 0;
    border-bottom: 1px solid #f0f0f2;
}
.paper-item:last-child { border: none; }
.paper-item .idx {
    font-size: 11px;
    font-weight: 600;
    color: #aaa;
    margin-bottom: 4px;
}
.paper-item .title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 6px;
}
.paper-item .title a {
    color: #1a1a2e;
    text-decoration: none;
}
.paper-item .title a:hover { color: #4f46e5; }
.paper-item .meta {
    font-size: 12px;
    color: #999;
    margin-bottom: 6px;
    line-height: 1.5;
}
.paper-item .meta code {
    background: #f0f0f2;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 11px;
    color: #666;
}
.signal-tag {
    display: inline-block;
    font-size: 11px;
    color: #4f46e5;
    background: #eef0ff;
    padding: 2px 8px;
    border-radius: 10px;
    margin-right: 4px;
    margin-bottom: 3px;
    font-weight: 500;
}

/* footer */
.footer {
    padding: 16px 24px;
    background: #fafafa;
    text-align: center;
    font-size: 11px;
    color: #bbb;
    line-height: 1.6;
}
.footer a { color: #999; text-decoration: none; }

/* empty */
.empty-note {
    text-align: center;
    padding: 40px 24px;
    color: #bbb;
    font-size: 14px;
    line-height: 1.8;
}
.empty-note .empty-icon { font-size: 40px; margin-bottom: 8px; }

/* folded note */
.folded-note {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    padding: 8px 0 14px 0;
    border-bottom: 1px solid #f0f0f2;
}
.folded-list {
    padding: 8px 0 0 0;
    font-size: 12px;
    color: #999;
    line-height: 1.8;
}
.folded-list code {
    background: #f0f0f2;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 10px;
    color: #888;
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="card">
    <div class="header">
      <div class="brand">arXiv Daily</div>
      <div class="date">5月18日 · 星期一</div>
    </div>
    <div class="stats-row">
      <div class="stat-box">
        <div class="num">0</div>
        <div class="label">检索论文</div>
      </div>
      <div class="stat-box">
        <div class="num">0</div>
        <div class="label">产品相关</div>
      </div>
    </div>
    <div class="paper-list"><div class="empty-note">
    <div class="empty-icon">📭</div>
    今天没有符合关键词的新论文<br>
    存量阅读日 📖
</div></div>
    <div class="footer">
      Paper2Product · 每日自动生成<br>
      <a href="https://github.com/graceruowenwang/paper2product">
        github.com/graceruowenwang/paper2product
      </a>
    </div>
  </div>
</div>
</body>
</html>
